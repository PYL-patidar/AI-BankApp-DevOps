apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: mysql-pvc
    namespace: bankapp
    labels:
      app: mysql

spec:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 5Gi
    storageClassName: manual
    selector:
      matchLabels:
        app: mysql

---


apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: ollama-pvc
    namespace: bankapp
    labels:
      app: ollama

spec:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 2Gi
    storageClassName: manual
    selector:
      matchLabels:
        app: ollama
