kind: Deployment
apiVersion: apps/v1
metadata:
  name: mysql-deployment
  namespace: bankapp
  labels:
    app: mysql

spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      name: mysql-pod
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          envFrom:
            - configMapRef:
                name: bankapp-configmap
            - secretRef:
                name: bankapp-secret
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
          - name: mysql-storage
            persistentVolumeClaim:
              claimName: mysql-pvc                   
